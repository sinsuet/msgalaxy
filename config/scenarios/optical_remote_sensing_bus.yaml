scenario_id: optical_remote_sensing_bus
description: Optical remote sensing microsat scenario on catalog-first shell/aperture contracts.
archetype_id: optical_remote_sensing_microsat
shell_spec_file: shell_box_panel_aperture_min.json
shell_variant: panel_box
rule_profile: satellite/optical_remote_sensing/default
comsol_physics_profile: electro_thermo_structural_canonical
constraints:
  max_temp_c: 65.0
  min_clearance_mm: 6.0
  max_cg_offset_mm: 20.0
  min_safety_factor: 2.0
  min_modal_freq_hz: 55.0
  max_voltage_drop_v: 0.5
  min_power_margin_pct: 10.0
  max_power_w: 180.0
  bus_voltage_v: 28.0
  enforce_power_budget: false
seed_profile:
  clearance_buffer_mm: 6.0
  zone_margin_mm: 10.0
  jitter_mm: 5.0
  grid_cols: 2
field_exports:
  - temperature
  - stress
  - displacement
catalog_component_instances:
  - instance_id: payload_camera
    catalog_component_file: payload_camera_composite.json
    zone_id: optical_payload_tube
    mount_face: +Z
    shell_contact_required: true
    aperture_site: camera_window
    preferred_orientation: +Z
    thermal_role: hot
    group_id: core_bus
    metadata:
      thermal:
        shell_mount_conductance_w_m2k: 1200.0
  - instance_id: avionics_core
    catalog_component_file: avionics_core_box.json
    zone_id: optical_avionics_middeck
    mount_face: +X
    shell_contact_required: true
    preferred_orientation: +Z
    group_id: core_bus
  - instance_id: adcs_module
    catalog_component_file: adcs_module_compact.json
    zone_id: optical_avionics_middeck
    mount_face: -X
    shell_contact_required: true
    preferred_orientation: +Z
    group_id: core_bus
  - instance_id: battery_pack
    catalog_component_file: battery_pack_compact.json
    zone_id: optical_power_base
    mount_face: -Z
    shell_contact_required: true
    preferred_orientation: +Z
    thermal_role: warm
    group_id: core_bus
  - instance_id: antenna_panel
    catalog_component_file: panel_antenna_extruded.json
    zone_id: optical_avionics_middeck
    mount_face: +Y
    shell_contact_required: true
    preferred_orientation: +Y
    group_id: core_bus
