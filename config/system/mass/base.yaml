project:
  name: msgalaxy
  version: 3.0.0
  description: Rebuilt scenario-driven mass runtime on shell/aperture/catalog contracts.

simulation:
  backend: comsol
  physics_profile: electro_thermo_structural_canonical
  enable_canonical_thermal_path: true
  canonical_strict_mode: true
  save_mph_each_eval: true
  save_mph_on_failure: true
  enable_structural_real: true
  enable_power_comsol_real: true
  enable_coupled_multiphysics_real: true
  enable_power_network_real: true
  structural_allowable_stress_mpa: 150.0
  structural_modal_count: 6
  structural_launch_accel_g: 6.0
  structural_youngs_modulus_gpa: 70.0
  structural_poissons_ratio: 0.33
  structural_density_kg_m3: 2700.0
  electrical_conductivity_s_per_m: 35000000.0
  constraints:
    max_temp_c: 65.0
    min_clearance_mm: 6.0
    max_cg_offset_mm: 20.0
    min_safety_factor: 2.0
    min_modal_freq_hz: 55.0
    max_voltage_drop_v: 0.5
    min_power_margin_pct: 10.0
    max_power_w: 200.0
    bus_voltage_v: 28.0
    enforce_power_budget: false

optimization:
  mode: mass
  pymoo_algorithm: nsga2
  pymoo_pop_size: 64
  pymoo_n_gen: 40
  pymoo_seed: 42
  pymoo_verbose: false

logging:
  base_dir: experiments

satellite_likeness_gate_mode: strict

openai:
  model: qwen3-max
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  default_text_profile: qwen_max_default
  profiles:
    qwen_max_default:
      provider: qwen
      api_style: openai_chat
      model: qwen3-max
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_envs:
      - DASHSCOPE_API_KEY
      - OPENAI_API_KEY
