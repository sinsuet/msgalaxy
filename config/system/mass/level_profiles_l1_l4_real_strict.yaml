version: 2

canonical_physics_domains:
  - geometry
  - thermal_real
  - structural_real
  - power_real
  - mission_keepout_real

canonical_operator_actions:
  - cg_recenter
  - group_move
  - fov_keepout_push
  - hot_spread
  - swap
  - bus_proximity_opt
  - add_heatstrap
  - set_thermal_contact
  - add_bracket
  - stiffener_insert

levels:
  L1:
    description: "Real-online strict foundation level"
    max_iterations: 1
    deterministic_move_ratio: 0.18
    deterministic_min_delta_mm: 10.0
    deterministic_max_delta_mm: 72.0
    mandatory_groups:
      - collision
      - clearance
      - boundary
      - thermal
      - cg_limit
      - struct_safety
      - struct_modal
      - power_vdrop
      - power_margin
      - power_peak
      - mission_keepout
    runtime_overrides:
      pymoo_pop_size: 10
      pymoo_n_gen: 4
      mass_search_space: operator_program
      mass_enable_operator_program: true
      mass_hard_constraint_coverage_mode: strict
      mass_metric_registry_mode: strict
      mass_physics_real_only: true
      mass_source_gate_mode: strict
      mass_source_gate_require_structural_real: true
      mass_source_gate_require_power_real: true
      mass_source_gate_require_thermal_real: true
      mass_source_gate_require_mission_real: true
      mass_comsol_feature_domain_audit_mode: strict
      mass_operator_family_gate_mode: strict
      mass_operator_realization_gate_mode: strict
      mass_operator_family_required: geometry,thermal,structural,power,mission
      mass_mission_fov_evaluator: simulation.mission_real_fov:evaluate_fov_keepout_real
      mass_max_attempts: 1
      mass_dynamic_attempts_enabled: false
      mass_enable_mcts: true
      mass_mcts_budget: 2
      mass_online_comsol_eval_budget: 8
      mass_online_comsol_geometry_gate: false
      mass_online_comsol_schedule_mode: ucb_topk
      mass_online_comsol_schedule_top_fraction: 0.35
      mass_online_comsol_schedule_min_observations: 4
      mass_online_comsol_schedule_warmup_calls: 4
      mass_online_comsol_schedule_explore_prob: 0.10
      mass_enable_physics_audit: true
      mass_audit_top_k: 2
      mass_enforce_audit_feasible: true
      mass_operator_program_action_slots: 10
      mass_operator_program_max_components: 5
      mass_operator_program_action_safety_tolerance: 1000.0
      mass_operator_program_forced_slot_actions:
        - cg_recenter
        - group_move
        - fov_keepout_push
        - hot_spread
        - swap
        - bus_proximity_opt
        - add_heatstrap
        - set_thermal_contact
        - add_bracket
        - stiffener_insert
      mass_operator_program_forced_slot_action_params:
        - axes: [x, y, z]
          strength: 0.95
          focus_ratio: 0.90
        - delta_mm: 2.0
          axis: x
          focus_ratio: 0.46
        - axis: z
          keepout_center_mm: 0.0
          min_separation_mm: 10.0
          preferred_side: auto
          focus_ratio: 0.52
        - axis: y
          min_pair_distance_mm: 10.0
          spread_strength: 0.44
          focus_ratio: 0.46
        - {}
        - axes: [x, y]
          focus_ratio: 0.36
        - conductance: 225.0
          update_mode: set
          focus_ratio: 0.56
        - conductance: 225.0
          update_mode: set
          bidirectional: true
          focus_ratio: 0.56
        - stiffness_gain: 0.20
          axes: [x, y]
          focus_ratio: 0.46
        - stiffness_gain: 0.25
          axes: [x, y, z]
          focus_ratio: 0.46

