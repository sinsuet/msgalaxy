project:
  name: msgalaxy
  version: 2.0.3
  description: LLM-driven satellite design optimization system with dynamic COMSOL
    integration
geometry:
  envelope:
    auto_envelope: true
    fill_ratio: 0.3
    size_ratio:
    - 1.7
    - 1.8
    - 1.5
    shell_thickness_mm: 5.0
    origin: center
  clearance_mm: 5.0
simulation:
  backend: comsol
  save_mph_each_eval: false
  save_mph_on_failure: true
  enable_structural_real: true
  enable_power_comsol_real: true
  enable_coupled_multiphysics_real: true
  enable_power_network_real: true
  structural_allowable_stress_mpa: 150.0
  structural_modal_count: 6
  structural_launch_accel_g: 6.0
  structural_youngs_modulus_gpa: 70.0
  structural_poissons_ratio: 0.33
  structural_density_kg_m3: 2700.0
  electrical_conductivity_s_per_m: 35000000.0
  power_source_current_scale: 1.0
  power_sink_current_scale: 1.0
  power_network_cable_resistance_ohm_per_m: 0.0085
  power_network_k_neighbors: 3
  power_network_congestion_alpha: 0.12
  constraints:
    max_temp_c: 50.0
    min_clearance_mm: 5.0
    max_mass_kg: 150.0
    max_power_w: 500.0
    max_cg_offset_mm: 20.0
    min_safety_factor: 2.0
    min_modal_freq_hz: 55.0
    max_voltage_drop_v: 0.5
    min_power_margin_pct: 10.0
    bus_voltage_v: 28.0
    enforce_power_budget: false
optimization:
  mode: agent_loop
  max_iterations: 20
  convergence_threshold: 0.01
  pymoo_pop_size: 96
  pymoo_n_gen: 80
  pymoo_seed: 42
  pymoo_verbose: false
  pymoo_return_least_infeasible: true
  pymoo_algorithm: nsga2
  pymoo_nsga3_ref_dirs_partitions: 0
  pymoo_moead_n_neighbors: 20
  pymoo_moead_prob_neighbor_mating: 0.9
  pymoo_moead_constraint_penalty: 1000.0
  mass_max_attempts: 3
  mass_dynamic_attempts_enabled: false
  mass_dynamic_attempts_align_mcts_budget: true
  mass_dynamic_attempts_max: 8
  mass_dynamic_attempts_component_pivot: 5
  mass_dynamic_attempts_component_step: 4
  mass_dynamic_attempts_per_step: 1
  mass_dynamic_attempts_strict_count_threshold: 3
  mass_dynamic_attempts_strictness_bonus: 1
  mass_dynamic_attempts_online_comsol_bonus: 1
  mass_dynamic_attempts_enforce_power_bonus: 1
  mass_dynamic_attempts_temp_threshold_c: 52.0
  mass_dynamic_attempts_clearance_threshold_mm: 6.0
  mass_dynamic_attempts_cg_threshold_mm: 18.0
  mass_dynamic_attempts_safety_factor_threshold: 2.1
  mass_dynamic_attempts_modal_freq_threshold_hz: 60.0
  mass_dynamic_attempts_voltage_drop_threshold_v: 0.45
  mass_dynamic_attempts_power_margin_threshold_pct: 8.0
  mass_relax_ratio: 0.08
  mass_auto_relax: true
  mass_retry_on_stall: true
  mass_inject_mandatory_constraints: true
  mass_mandatory_hard_constraints:
  - collision
  - clearance
  - boundary
  - thermal
  - cg_limit
  mass_hard_constraint_coverage_mode: warn
  mass_metric_registry_mode: warn
  mass_physics_real_only: false
  mass_source_gate_mode: 'off'
  mass_source_gate_require_structural_real: false
  mass_source_gate_require_power_real: false
  mass_source_gate_require_thermal_real: false
  mass_source_gate_require_mission_real: false
  mass_comsol_feature_domain_audit_mode: 'off'
  mass_operator_family_gate_mode: 'off'
  mass_operator_realization_gate_mode: 'off'
  mass_operator_family_required: geometry,thermal,structural,power,mission
  mass_mission_fov_evaluator: ''
  mass_thermal_evaluator_mode: proxy
  mass_enable_semantic_zones: true
  mass_online_comsol_eval_budget: 24
  mass_online_comsol_geometry_gate: true
  mass_online_comsol_cache_quantize_mm: 0.0
  mass_online_comsol_schedule_mode: budget_only
  mass_online_comsol_schedule_top_fraction: 0.2
  mass_online_comsol_schedule_min_observations: 8
  mass_online_comsol_schedule_warmup_calls: 2
  mass_online_comsol_schedule_explore_prob: 0.05
  mass_online_comsol_schedule_uncertainty_weight: 0.35
  mass_online_comsol_schedule_uncertainty_scale_mm: 25.0
  mass_online_comsol_stats_log_interval: 5000
  mass_trace_feature_window: 5
  mass_enable_meta_policy: true
  mass_meta_policy_apply_runtime: true
  mass_meta_policy_min_attempts: 2
  mass_enable_physics_audit: true
  mass_audit_top_k: 3
  mass_enforce_audit_feasible: true
  mass_audit_allow_infeasible_fallback: false
  mass_enable_mcts: true
  mass_mcts_budget: 4
  mass_mcts_max_depth: 2
  mass_mcts_c_uct: 1.2
  mass_mcts_stagnation_rounds: 2
  mass_mcts_min_score_improvement: 1.0
  mass_mcts_min_cv_improvement: 0.1
  mass_mcts_prune_margin: 100.0
  mass_mcts_action_prior_weight: 0.02
  mass_mcts_cv_penalty_weight: 0.2
  mass_search_space: coordinate
  mass_enable_operator_program: true
  mass_enable_operator_credit_bias: true
  mass_operator_program_max_components: 6
  mass_operator_program_action_slots: 3
  mass_operator_program_max_group_delta_mm: 10.0
  mass_operator_program_max_hot_distance_mm: 12.0
  mass_operator_program_action_safety_tolerance: 0.5
  mission_keepout_axis: z
  mission_keepout_center_mm: 0.0
  mission_min_separation_mm: 0.0
  mass_enable_seed_population: true
  mass_enable_operator_seed_population: true
  mass_seed_population_max: 8
  mass_cg_seed_component_threshold: 12
  mass_repair_cg_nudge_ratio: 0.9
  allowed_operators:
  - MOVE
  - SWAP
  - ROTATE
  - DEFORM
  - ALIGN
  - CHANGE_ENVELOPE
  - ADD_BRACKET
  - REPACK
  - MODIFY_COATING
  - ADD_HEATSINK
  - SET_THERMAL_CONTACT
  - ADJUST_LAYOUT
  - CHANGE_ORIENTATION
openai:
  api_key: ${OPENAI_API_KEY}
  model: qwen3-max
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.7
  timeout_s: 300
  max_tokens: 8192
  completion_budget_tokens: 8192
  reasoning_profile: high
  thinking_mode: enabled
  reasoning_budget_tokens: 4096
  default_text_profile: qwen_max_default
  default_embedding_profile: qwen_embedding_default
  profiles:
    qwen_max_default:
      provider: qwen
      api_style: openai_chat
      model: qwen3-max
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_envs:
      - DASHSCOPE_API_KEY
      - OPENAI_API_KEY
      temperature: 0.7
      timeout_s: 300
      max_tokens: 8192
      completion_budget_tokens: 8192
      reasoning_profile: high
      thinking_mode: enabled
      strict_json_thinking_mode: disabled
      reasoning_budget_tokens: 4096
      capabilities:
        native_json_output: true
      native_fallback:
        enabled: true
    openai_gpt_default:
      provider: openai
      api_style: openai_chat
      model: gpt-5-chat-latest
      base_url: https://api.openai.com/v1
      api_key_envs:
      - OPENAI_API_KEY
      temperature: 0.7
      max_tokens: 2000
      capabilities:
        native_json_output: true
      native_fallback:
        enabled: false
    openai_gpt_relay_default:
      provider: openai_compatible
      api_style: openai_responses
      model: gpt-5.4
      base_url: https://cdn-gmn.chuangzuoli.com/v1/responses
      api_key_envs:
      - OPENAI_RELAY_API_KEY
      - OPENAI_API_KEY
      temperature: 0.7
      timeout_s: 300
      max_tokens: 8192
      completion_budget_tokens: 8192
      capabilities:
        native_json_output: false
      native_fallback:
        enabled: false
    claude_compat_default:
      provider: anthropic
      api_style: openai_chat
      model: claude-opus-4-1-20250805
      base_url: https://api.anthropic.com/v1/
      api_key_envs:
      - ANTHROPIC_API_KEY
      temperature: 0.7
      max_tokens: 2000
      capabilities:
        native_json_output: false
      native_fallback:
        enabled: false
    glm_compat_default:
      provider: glm
      api_style: openai_chat
      model: glm-4.7
      base_url: https://open.bigmodel.cn/api/paas/v4
      api_key_envs:
      - BIGMODEL_API_KEY
      temperature: 0.7
      max_tokens: 2000
      capabilities:
        native_json_output: false
      native_fallback:
        enabled: false
    minimax_compat_default:
      provider: minimax
      api_style: openai_chat
      model: MiniMax-M2.5
      base_url: https://api.minimax.io/v1
      api_key_envs:
      - MINIMAX_API_KEY
      temperature: 0.7
      max_tokens: 2000
      capabilities:
        native_json_output: false
      native_fallback:
        enabled: false
    qwen_embedding_default:
      provider: qwen
      api_style: openai_embeddings
      model: text-embedding-v4
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_envs:
      - DASHSCOPE_API_KEY
      - OPENAI_API_KEY
      capabilities:
        embeddings: true
knowledge:
  base_path: data/knowledge_base
  enable_semantic: true
  embedding_model: text-embedding-v4
  filter_anomalous_cases: true
  anomaly_temp_tokens:
  - '999.0'
  - '9999.0'
  - 999°C
  - 9999°C
  anomaly_max_temp_delta_abs: 200.0
logging:
  level: INFO
  output_dir: experiments
  save_llm_interactions: true
  save_visualizations: true
